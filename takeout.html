<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAKEOUT | Blue Harbor Coffee</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
</head>
  
<style>
  body { font-family: 'Zen Kaku Gothic New', sans-serif; color: #333; }
  .font-eng { font-family: 'Jost', sans-serif; }

  .page-enter { animation: fadeIn 0.6s ease-out forwards; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .nav-link.active { border-bottom: 2px solid #3b82f6; color: #1d4ed8; }
  .nav-link.active svg { color: #1d4ed8; }

  /* =========================
     🔺 三角リボン（完全版）
  ========================= */

  .badge {
    position: absolute;
    top: 0;
    left: 0;
    width: 90px;
    height: 90px;
    z-index: 20;
    pointer-events: none;
  }

  /* 三角本体 */
  .badge::before {
    content: "";
    position: absolute;
    inset: 0;
    background: inherit;
    clip-path: polygon(0 0, 100% 0, 0 100%);
  }

  /* 🔥 内側コンテナ（ここで制限） */
  .badge span {
    position: absolute;
    top: 0;
    left: 0;
    width: 90px;
    height: 90px;

    display: flex;
    align-items: center;
    justify-content: center;

    overflow: hidden; /* ← これが重要 */
  }

  /* テキスト */
  .badge span p {
    transform: rotate(-45deg);
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  /* 色 */
  .badge.no1 { background: #d4af37; }
  .badge.limited { background: #7c3aed; }
  .badge.new { background: #ef4444; }

</style>

<body class="bg-stone-50 text-slate-800">

<!-- 使用例（ここ重要） -->
<div class="relative w-64 h-40 bg-gray-200">

  <div class="badge new">
    <span>
      <p>NEW</p>
    </span>
  </div>

</div>

</body>
</html>
