<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TAKEOUT | Blue Harbor Coffee</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-stone-50 text-slate-800">

<!-- Header -->
<div id="header"></div>

<!-- Hero Section -->
<section class="relative mt-16 md:mt-20 h-[340px] md:h-[460px] overflow-hidden">

  <!-- Hero Image -->
  <img
    src="images/TakeOut/hero.png"
    class="absolute inset-0 w-full h-full object-cover object-[70%_center] scale-105"
  >

  <!-- Gradient -->
  <div class="absolute inset-0 bg-gradient-to-r from-black/60 via-black/30 to-transparent"></div>

  <!-- Text -->
  <div class="relative z-10 h-full flex items-center">

    <div class="max-w-7xl mx-auto px-6 w-full">

      <div class="text-white max-w-lg">

        <h1 class="text-4xl md:text-5xl tracking-[0.25em] mb-4">
          TAKEOUT
        </h1>

        <p class="text-sm tracking-widest opacity-90">
          Online Reservation
        </p>

      </div>

    </div>

  </div>

</section>
  
<!-- Main Area -->
<div class="max-w-7xl mx-auto px-6 py-16">

<div class="grid lg:grid-cols-[2fr_1fr] gap-16">


<!-- Product Area -->
<div id="productArea" class="space-y-24"></div>


<!-- Sticky Order Summary -->
<div class="sticky top-28 h-fit">

<div class="bg-white p-8 rounded-2xl shadow-lg">

<h3 class="text-xl mb-6 tracking-wide">
Your Order
</h3>

<div id="orderSummary" class="space-y-2 text-sm text-slate-700"></div>

<div class="border-t mt-6 pt-4 flex justify-between font-semibold text-lg">

<span>Total</span>

<span id="totalPrice">
¥0
</span>

</div>

<button
onclick="goCustomer()"
class="mt-8 w-full bg-amber-900 text-white py-4 rounded-full hover:bg-amber-800 transition shadow-md"
>

ご注文内容を確認

</button>

</div>

</div>


</div>
</div>


<!-- Mobile Floating Cart -->
<div
class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-xl p-4 md:hidden flex justify-between items-center"
>

<span
id="mobileTotal"
class="font-semibold text-lg"
>

¥0

</span>

<button
onclick="goCustomer()"
class="bg-amber-900 text-white px-6 py-3 rounded-full hover:bg-amber-800 transition"
>

注文確認

</button>

</div>


<!-- Footer -->
<footer class="bg-gray-50 border-t border-gray-200 py-12 text-center text-xs text-gray-400">

© 2024 Blue Harbor Coffee Roasters.

</footer>


<!-- Header Loader -->
<script src="js/loadHeader.js"></script>


<!-- TAKEOUT SCRIPT -->
<script type="module" src="js/takeout.js"></script>


</body>
</html>
