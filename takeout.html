<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TAKEOUT | Blue Harbor Coffee</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<style>
  body { font-family: 'Zen Kaku Gothic New', sans-serif; color: #333; }
  .font-eng { font-family: 'Jost', sans-serif; }

  .page-enter { animation: fadeIn 0.6s ease-out forwards; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .nav-link.active { border-bottom: 2px solid #3b82f6; color: #1d4ed8; }
  .nav-link.active svg { color: #1d4ed8; }

  /* 🔥 タグバッジ（未使用でも残してOK） */
  .tag-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: #2563eb;
    color: white;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 9999px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }

  .tag-no1 {
    background: #ef4444;
  }

  /* =========================
     🔥 強化リボン
  ========================= */
  .ribbon {
    position: absolute;
    top: 18px;
    left: -45px;
    width: 200px;
    text-align: center;
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    color: white;
    font-size: 14px;
    font-weight: 700;
    padding: 8px 0;
    transform: rotate(-45deg);
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    letter-spacing: 0.1em;
    z-index: 20;
  }

  .ribbon::before,
  .ribbon::after {
    content: "";
    position: absolute;
    bottom: -6px;
    border: 6px solid transparent;
  }

  .ribbon::before {
    left: 0;
    border-right-color: rgba(0,0,0,0.2);
  }

  .ribbon::after {
    right: 0;
    border-left-color: rgba(0,0,0,0.2);
  }

  .ribbon.no1 {
    background: linear-gradient(135deg, #ffd700, #ff3b3b);
    font-size: 15px;
    padding: 10px 0;
    box-shadow: 0 10px 25px rgba(0,0,0,0.35);
  }

  .relative:hover .ribbon {
    transform: rotate(-45deg) scale(1.05);
  }

  /* 🔥 アニメーション */
  .scale-pop {
    transform: scale(1.2);
    transition: transform 0.2s ease;
  }

  .fade-out {
    opacity: 0;
    transform: translateX(10px);
    transition: all 0.3s ease;
  }

</style>

<body class="bg-stone-50 text-slate-800">

<!-- Header -->
<div id="header"></div>

<!-- HERO -->
<section class="relative h-[80vh] md:h-[600px] w-full bg-gray-900 overflow-hidden page-enter">

  <!-- PC HERO -->
  <img
    src="images/TakeOut/hero.png"
    alt="Takeout hero"
    class="hidden md:block absolute inset-0 w-full h-full object-cover opacity-70"
  >

  <!-- MOBILE HERO -->
  <img
    src="images/TakeOut/hero-sm.png"
    alt="Takeout hero mobile"
    class="md:hidden w-full h-auto object-contain"
  >

  <!-- overlay -->
  <div class="absolute inset-0 bg-black/40"></div>

  <!-- text -->
  <div class="absolute inset-0 flex items-center md:items-center justify-center md:justify-start text-white px-6 md:px-16">

    <div class="text-center md:text-left max-w-xl">

      <h2 class="font-eng text-5xl md:text-7xl font-bold tracking-wide text-white mb-3">
        TAKE OUT
      </h2>

      <p class="font-eng text-sm md:text-lg tracking-[0.3em] text-blue-200 opacity-80 mt-6 md:mt-8">
        ONLINE RESERVATION
      </p>

    </div>
  </div>
</section>

<!-- Main Area -->
<div class="max-w-7xl mx-auto px-6 py-16">

  <div class="grid lg:grid-cols-[2fr_1fr] gap-16">

    <!-- Product Area -->
    <div id="productArea" class="space-y-24"></div>

    <!-- Sticky Order Summary -->
    <div class="sticky top-28 h-fit">

      <div class="bg-white p-8 rounded-2xl shadow-lg">

        <h3 class="text-xl mb-6 tracking-wide">
          Your Order
        </h3>

        <div id="orderSummary" class="space-y-2 text-sm text-slate-700"></div>

        <div class="border-t mt-6 pt-4 flex justify-between font-semibold text-lg">
          <span>Total</span>
          <span id="totalPrice">¥0</span>
        </div>

        <button
          onclick="goCustomer()"
          class="mt-8 w-full bg-amber-900 text-white py-4 rounded-full hover:bg-amber-800 transition shadow-md"
        >
          お客様情報入力へ
        </button>

      </div>

    </div>

  </div>

</div>

<!-- Mobile Floating Cart -->
<div
class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-xl p-4 md:hidden flex justify-between items-center"
>

<span id="mobileTotal" class="font-semibold text-lg">
¥0
</span>

<button
onclick="goCustomer()"
class="bg-amber-900 text-white px-6 py-3 rounded-full hover:bg-amber-800 transition"
>
お客様情報入力へ
</button>

</div>

<!-- Footer -->
<footer class="bg-gray-50 border-t border-gray-200 py-12 text-center text-xs text-gray-400">
© 2024 Blue Harbor Coffee Roasters.
</footer>

<!-- Header Loader -->
<script src="js/loadHeader.js"></script>

<!-- TAKEOUT SCRIPT -->
<script type="module" src="js/takeout.js"></script>

</body>
</html>
