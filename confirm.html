<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmation | Blue Harbor Coffee</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  body { 
    font-family: 'Zen Kaku Gothic New', sans-serif; 
    color: #333; 
    font-variant-numeric: tabular-nums;
  }

  .font-eng {
    font-family: 'Jost', sans-serif;
  }

  .nav-link.active {
    border-bottom: 2px solid #3b82f6;
    color: #1d4ed8;
  }

  .nav-link.active svg {
    color: #1d4ed8;
  }
</style>

</head>

<body class="bg-slate-50 text-slate-800 pt-40 md:pt-24">

<!-- Header -->
<div id="header"></div>

<div class="max-w-4xl mx-auto px-6 py-16">

<!-- Title -->
<div class="text-center mb-16">

<h1 class="text-4xl font-light tracking-widest mb-4">
Order Confirmation
</h1>

<p class="text-slate-500">
注文内容の確認
</p>

</div>

<!-- Order Info -->
<div class="bg-white p-10 rounded-2xl shadow-sm mb-10">

<h2 class="text-2xl mb-8 font-semibold">
ご注文内容
</h2>

<div id="orderItems" class="space-y-3 text-sm"></div>

<div class="border-t mt-6 pt-6 space-y-2 text-sm">

<div class="flex justify-between">
<span>小計</span>
<span id="orderSubtotal"></span>
</div>

<div class="flex justify-between text-slate-500">
<span>消費税（8%）</span>
<span id="orderTax"></span>
</div>

<div class="flex justify-between text-lg font-semibold pt-2 border-t">
<span>合計（税込）</span>
<span id="orderTotal"></span>
</div>

</div>

</div>

<!-- Customer Info -->
<div class="bg-white p-10 rounded-2xl shadow-sm">

<h2 class="text-2xl mb-8 font-semibold">
お客様情報
</h2>

<div class="divide-y divide-slate-200 text-sm">

<div class="py-5">
  <div class="font-bold text-slate-800 text-sm mb-2 tracking-wide">
    お名前
  </div>
  <div class="text-slate-900 text-lg">
    <span id="c_name"></span>
  </div>
</div>

<div class="py-5">
  <div class="font-bold text-slate-800 text-sm mb-2 tracking-wide">
    電話番号
  </div>
  <div class="text-slate-900 text-lg">
    <span id="c_phone"></span>
  </div>
</div>

<div class="py-5">
  <div class="font-bold text-slate-800 text-sm mb-2 tracking-wide">
    メール
  </div>
  <div class="text-slate-900 text-base break-all">
    <span id="c_email"></span>
  </div>
</div>

<div class="py-5">
  <div class="font-bold text-slate-800 text-sm mb-2 tracking-wide">
    来店日
  </div>
  <div class="text-slate-900 text-lg">
    <span id="c_date"></span>
  </div>
</div>

<div class="py-5">
  <div class="font-bold text-slate-800 text-sm mb-2 tracking-wide">
    来店時間
  </div>
  <div class="text-slate-900 text-lg">
    <span id="c_time"></span>
  </div>
</div>

<div class="py-5">
  <div class="font-bold text-slate-800 text-sm mb-2 tracking-wide">
    お問い合わせ
  </div>
  <div class="text-slate-900 text-base leading-relaxed whitespace-pre-wrap">
    <span id="c_message"></span>
  </div>
</div>

</div>
</div>

<!-- Buttons -->
<div class="flex flex-col gap-6 mt-10">

<!-- 🔥 reCAPTCHA（callback追加） -->
<div class="flex justify-center">
<div 
  class="g-recaptcha" 
  data-sitekey="6LcVLbcsAAAAAOHmRkXC6ELjVlQ04vFNeMXW_rfQ"
  data-callback="enableSubmit"
  data-expired-callback="disableSubmit">
</div>
</div>

<div class="flex gap-4">
<button
onclick="backToCustomer()"
class="w-full bg-gray-200 py-4 rounded-xl hover:bg-gray-300 transition">
戻る
</button>

<!-- 🔥 初期状態は押せない -->
<button
id="submitBtn"
onclick="submitOrder()"
disabled
class="w-full bg-blue-600 text-white py-4 rounded-xl opacity-50 cursor-not-allowed">
注文確定
</button>
</div>

</div>

</div>

<!-- Footer -->
<footer class="bg-gray-50 border-t border-gray-200 py-12 text-center text-xs text-gray-400">
© 2024 Blue Harbor Coffee Roasters.
</footer>

<script src="js/loadHeader.js"></script>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- 🔥 reCAPTCHA読み込み -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script type="module" src="js/confirm.js"></script>

</body>
</html>
