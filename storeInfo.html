<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location | Blue Harbor Coffee</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
  body { font-family: 'Zen Kaku Gothic New', sans-serif; color: #333; }
  .font-eng { font-family: 'Jost', sans-serif; }
  .page-enter { animation: fadeIn 0.6s ease-out forwards; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .nav-link.active { border-bottom: 2px solid #3b82f6; color: #1d4ed8; }
  .nav-link.active svg { color: #1d4ed8; }
  </style>
</head>

<body class="bg-white flex flex-col min-h-screen">

  <div id="header"></div>

  <main class="flex-grow pt-[112px] md:pt-28">

    <!-- HERO -->
    <section class="relative h-[80vh] md:h-[620px] w-full overflow-hidden page-enter -mt-[112px] md:-mt-28">
      <img id="hero-image" src="" class="absolute inset-0 w-full h-full object-cover">
      <div class="absolute inset-0 bg-black/40"></div>
      <div class="relative h-full flex items-center justify-center text-white text-center">
        <h1 id="hero-title" class="text-5xl md:text-7xl font-eng font-bold tracking-widest"></h1>
      </div>
    </section>

    <!-- =========================
         Exterior
    ========================== -->
    <section class="bg-white py-20 px-6">
      <div class="max-w-6xl mx-auto page-enter">

        <h2 class="text-3xl font-eng tracking-widest mb-10 text-center">
          Exterior
        </h2>

        <div id="gallery" class="grid md:grid-cols-3 gap-6"></div>

      </div>
    </section>

    <!-- =========================
         Maps & Access
    ========================== -->
    <section class="bg-gray-50 py-20 px-6">
      <div class="max-w-6xl mx-auto page-enter">

        <h2 class="text-3xl font-eng tracking-widest mb-12 text-center">
          Maps & Access
        </h2>

        <!-- 地図 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

          <!-- 手書き風地図 -->
          <div class="w-full aspect-[16/9]">
            <img id="map-image" src="" class="w-full h-full object-contain rounded-xl shadow-md">
          </div>

          <!-- Google Map -->
          <div class="w-full aspect-[16/9] rounded-xl overflow-hidden shadow-md">
            <iframe id="google-map"
              src=""
              width="100%" height="100%"
              style="border:0;" allowfullscreen=""
              loading="lazy">
            </iframe>
          </div>

        </div>

        <!-- Access -->
        <div id="access-info" class="mt-12 flex justify-center">
          <!-- JSでカード -->
        </div>

      </div>
    </section>

    <!-- =========================
         Details（修正済み）
    ========================== -->
    <section class="bg-white py-20 px-6">
      <div class="max-w-6xl mx-auto page-enter">

        <h2 class="text-3xl font-eng tracking-widest mb-10 text-center">
          Details
        </h2>

        <div class="bg-gray-50 rounded-xl p-8 md:p-10 shadow-inner w-full">

          <!-- ✅ PCで2カラム / スマホは1カラム -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-12">

            <!-- 左：すべて（営業時間以外） -->
            <div id="store-info-main" class="space-y-8">
              <!-- JS -->
            </div>

            <!-- 右：営業時間のみ -->
            <div id="store-hours" class="flex flex-col justify-center">
              <!-- JS -->
            </div>

          </div>

        </div>

      </div>
    </section>

  </main>

  <footer class="bg-gray-50 border-t border-gray-200 py-12 text-center text-xs text-gray-400 font-eng">
    © 2024 Blue Harbor Coffee Roasters.
  </footer>

  <script src="js/loadHeader.js"></script>
  <script src="js/storeInfo.js"></script>

</body>

</html>
