<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Harbor Coffee | Specialty Coffee Roaster</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      color: #333;
    }

    .font-eng {
      font-family: 'Jost', sans-serif;
    }

    .page-enter {
      animation: fadeIn 0.6s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    ul,
    ul.list-disc {
      list-style: none !important;
      padding-left: 0 !important;
    }

    li {
      position: relative;
      padding-left: 30px;
    }

    li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 6px;
      width: 16px;
      height: 26px;
      background-color: #78350f;
      border-radius: 50% / 60%;
    }

    li::after {
      content: "";
      position: absolute;
      left: 7px;
      top: 6px;
      width: 2px;
      height: 26px;
      background: white;
      border-radius: 50%;
      transform: rotate(10deg);
    }
  </style>
</head>

<!-- SVG -->
<svg width="0" height="0" style="position:absolute;">
  <symbol id="coffee-bean" viewBox="0 0 24 36">
    <ellipse cx="12" cy="18" rx="8" ry="14" />
    <path d="M12 4 C9 10, 9 26, 12 32"
      fill="none"
      stroke="white"
      stroke-width="1.5"
      stroke-linecap="round" />
  </symbol>
</svg>

<!-- TEMPLATE -->
<template id="coffee-beans">
  <div class="flex justify-center gap-4 mt-6 text-amber-900">

    <svg width="18" height="28" class="rotate-12 fill-current">
      <use href="#coffee-bean"></use>
    </svg>

    <svg width="18" height="28" class="-rotate-6 fill-current">
      <use href="#coffee-bean"></use>
    </svg>

    <svg width="18" height="28" class="rotate-6 fill-current">
      <use href="#coffee-bean"></use>
    </svg>

    <svg width="18" height="28" class="-rotate-12 fill-current">
      <use href="#coffee-bean"></use>
    </svg>

    <svg width="18" height="28" class="rotate-12 fill-current">
      <use href="#coffee-bean"></use>
    </svg>

  </div>
</template>
  
<body class="bg-white flex flex-col min-h-screen">

<div id="header"></div>

<main class="flex-grow">

<!-- HERO -->
<section class="relative h-[80vh] md:h-[620px] w-full overflow-hidden page-enter">
  <img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?auto=format&fit=crop&w=2000&q=80"
       class="absolute inset-0 w-full h-full object-cover">
  <div class="absolute inset-0 bg-black/40"></div>

  <div class="relative h-full flex items-center justify-center text-white text-center">
    <h1 class="text-5xl md:text-7xl font-eng font-bold tracking-widest">
      ABOUT&nbsp;US
    </h1>
  </div>
</section>

<!-- PHILOSOPHY -->
<section class="bg-white py-24 px-6">

<h2 class="text-center mb-20">
  <span class="block w-12 h-px bg-gray-300 mx-auto mb-4"></span>

  <span class="block text-xs tracking-[0.5em] text-gray-400 font-eng mb-2">
    BLUE HARBOR COFFEE
  </span>

  <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">
    PHILOSOPHY
  </span>

  <div class="bean-decoration mt-6"></div>

  <span class="block w-12 h-px bg-gray-300 mx-auto mt-6"></span>
</h2>

<div class="max-w-3xl mx-auto text-center">
  <p id="philosophy-lead" class="text-xl md:text-2xl text-gray-700 mb-8"></p>
  <p id="philosophy-text1" class="text-gray-600 mb-6"></p>
  <p id="philosophy-text2" class="text-gray-600"></p>
</div>

</section>

<!-- OWNER -->
<section class="bg-slate-50 py-24 px-6">

<h2 class="text-center mb-16">
  <span class="block w-12 h-px bg-gray-300 mx-auto mb-4"></span>

  <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">
    OWNER
  </span>

  <div class="bean-decoration mt-6"></div>

  <span class="block w-12 h-px bg-gray-300 mx-auto mt-4"></span>
</h2>

<div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">

  <img src="https://images.unsplash.com/photo-1556157382-97eda2d62296?q=80&w=1200"
       class="w-full rounded-xl shadow-lg object-cover">

  <div>
    <h3 id="owner-name" class="text-2xl font-medium mb-6"></h3>
    <p id="owner-text1" class="mb-4"></p>
    <p id="owner-text2"></p>
  </div>

</div>

</section>

<!-- BEANS -->
<section class="bg-white py-24 px-6">

<h2 class="text-center mb-16">
  <span class="block w-12 h-px bg-gray-300 mx-auto mb-4"></span>

  <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">
    SIGNATURE BEANS
  </span>

  <div class="bean-decoration mt-6"></div>

  <span class="block w-12 h-px bg-gray-300 mx-auto mt-4"></span>
</h2>

<div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">

  <img src="images/AboutUs/farmer.png"
       class="w-full rounded-xl shadow-lg object-cover">

  <div>
    <h3 id="beans-title" class="text-2xl font-medium mb-6"></h3>
    <p id="beans-text" class="mb-4"></p>
    <ul id="beans-list"></ul>
  </div>

</div>

</section>

<!-- FRUITS -->
<section class="bg-amber-50 py-24 px-6">

<h2 class="text-center mb-16">
  <span class="block w-12 h-px bg-amber-300 mx-auto mb-4"></span>

  <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">
    FRUITS
  </span>

  <div class="bean-decoration mt-6"></div>

  <span class="block w-12 h-px bg-amber-300 mx-auto mt-4"></span>
</h2>

<div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">

  <img src="images/AboutUs/blueberry_lemon.png"
       class="w-full rounded-xl shadow-lg object-cover">

  <div>
    <p id="fruits-text" class="mb-4"></p>
    <ul id="fruits-list"></ul>
  </div>

</div>

</section>

</main>

<footer class="bg-gray-50 border-t py-12 text-center text-xs text-gray-400 font-eng">
  © 2024 Blue Harbor Coffee Roasters.
</footer>

<script src="js/loadHeader.js"></script>
<script src="js/aboutUs.js"></script>

</body>
</html>
