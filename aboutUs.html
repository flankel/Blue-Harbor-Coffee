<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Harbor Coffee | Specialty Coffee Roaster</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      color: #333;
    }

    .font-eng {
      font-family: 'Jost', sans-serif;
    }

    .page-enter {
      animation: fadeIn 0.6s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .nav-link.active {
      color: #1d4ed8 !important;
      border-bottom: 2px solid #3b82f6;
    }

    .nav-link.active svg {
      color: #1d4ed8 !important;
    }

    ul,
    ul.list-disc {
      list-style: none !important;
      padding-left: 0 !important;
    }

    .bean-list li {
      position: relative;
      padding-left: 40px;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .bean-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 6px;
      width: 16px;
      height: 26px;
      background-color: #78350f;
      border-radius: 50% / 60%;
    }

    .bean-list li::after {
      content: "";
      position: absolute;
      left: 7px;
      top: 6px;
      width: 2px;
      height: 26px;
      background: white;
      border-radius: 50%;
      transform: rotate(10deg);
    }

    .bean-list li .name-en {
      font-family: 'Jost', sans-serif;
      font-weight: 600;
      font-size: 1.2rem;
      color: #1d4ed8;
      display: block;
    }

    .bean-list li .name-jp {
      font-weight: 500;
      font-size: 1rem;
      color: #333;
      display: block;
    }

    .bean-list li .desc {
      font-size: 0.9rem;
      color: #666;
      display: block;
      margin-top: 2px;
    }

    .bean-decoration {
      display: flex;
      justify-content: center;
    }

    /* ★ 追加：マグを並べるための行 */
    .mug-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

  </style>
</head>

<body class="bg-white flex flex-col min-h-screen">

  <div id="header"></div>

  <main class="flex-grow">

    <!-- HERO -->
    <section class="relative h-[80vh] md:h-[620px] w-full overflow-hidden page-enter">
      <img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?auto=format&fit=crop&w=2000&q=80"
           class="absolute inset-0 w-full h-full object-cover">
      <div class="absolute inset-0 bg-black/40"></div>

      <div class="relative h-full flex items-center justify-center text-white text-center">
        <h1 class="text-5xl md:text-7xl font-eng font-bold tracking-widest">
          ABOUT&nbsp;US
        </h1>
      </div>
    </section>

    <!-- PHILOSOPHY -->
    <section class="bg-white py-24 px-6">

      <h2 class="text-center mb-20">
        <div class="bean-decoration mb-6">
          <div class="mug-row"></div>
        </div>
        <span class="block text-xs tracking-[0.5em] text-gray-400 font-eng mb-2">BLUE HARBOR COFFEE</span>
        <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">PHILOSOPHY</span>
        <div class="bean-decoration mt-6">
          <div class="mug-row"></div>
        </div>
      </h2>

      <div class="max-w-3xl mx-auto text-center">
        <p id="philosophy-lead" class="text-xl md:text-2xl text-gray-700 mb-8"></p>
        <p id="philosophy-text1" class="text-gray-600 mb-6"></p>
        <p id="philosophy-text2" class="text-gray-600"></p>
      </div>

    </section>

    <!-- OWNER -->
    <section class="bg-slate-50 py-24 px-6">

      <h2 class="text-center mb-16">
        <div class="bean-decoration mb-6">
          <div class="mug-row"></div>
        </div>
        <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">OWNER</span>
        <div class="bean-decoration mt-6">
          <div class="mug-row"></div>
        </div>
      </h2>

      <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">

        <img src="https://images.unsplash.com/photo-1556157382-97eda2d62296?q=80&w=1200"
             class="w-full rounded-xl shadow-lg object-cover">

        <div>
          <h3 id="owner-name" class="text-2xl font-medium mb-6"></h3>
          <p id="owner-text1" class="mb-4"></p>
          <p id="owner-text2"></p>
        </div>

      </div>

    </section>

    <!-- BEANS -->
    <section class="bg-white py-24 px-6">

      <h2 class="text-center mb-16">
        <div class="bean-decoration mb-6">
          <div class="mug-row"></div>
        </div>
        <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">SIGNATURE BEANS</span>
        <div class="bean-decoration mt-6">
          <div class="mug-row"></div>
        </div>
      </h2>

      <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">

        <img src="images/AboutUs/farmer.png"
             class="w-full rounded-xl shadow-lg object-cover">

        <div>
          <h3 id="beans-title" class="text-2xl font-medium mb-6"></h3>
          <p id="beans-text" class="mb-4"></p>
          <ul id="beans-list" class="bean-list"></ul>
        </div>

      </div>

    </section>

    <!-- FRUITS -->
    <section class="bg-amber-50 py-24 px-6">

      <h2 class="text-center mb-16">
        <div class="bean-decoration mb-6">
          <div class="mug-row"></div>
        </div>
        <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">FRUITS</span>
        <div class="bean-decoration mt-6">
          <div class="mug-row"></div>
        </div>
      </h2>

      <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">

        <img src="images/AboutUs/blueberry_lemon.png"
             class="w-full rounded-xl shadow-lg object-cover">

        <div>
          <p id="fruits-text" class="mb-4"></p>
          <ul id="fruits-list" class="bean-list"></ul>
        </div>

      </div>

    </section>

  </main>

  <footer class="bg-gray-50 border-t py-12 text-center text-xs text-gray-400 font-eng">
    © 2024 Blue Harbor Coffee Roasters.
  </footer>

  <!-- ★ コーヒー豆SVG（単体テンプレ） -->
<template id="coffee-beans">
  <svg width="44" height="70" viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">

    <defs>
      <radialGradient id="beanMain" cx="35%" cy="25%" r="75%">
        <stop offset="0%" stop-color="#e6b67f"/>
        <stop offset="40%" stop-color="#c48744"/>
        <stop offset="80%" stop-color="#8a5528"/>
        <stop offset="100%" stop-color="#4d2c14"/>
      </radialGradient>

      <radialGradient id="beanHighlight" cx="25%" cy="20%" r="45%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>

      <radialGradient id="beanShadow" cx="75%" cy="80%" r="55%">
        <stop offset="0%" stop-color="rgba(0,0,0,0.35)"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
      </radialGradient>

      <radialGradient id="grooveCore" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="#1a0d05"/>
        <stop offset="60%" stop-color="#2b160a"/>
        <stop offset="100%" stop-color="#5a3416"/>
      </radialGradient>

      <linearGradient id="grooveEdge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
        <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0.2)"/>
      </linearGradient>
    </defs>

    <g transform="rotate(28 30 45)">
      <ellipse cx="30" cy="45" rx="22" ry="30" fill="url(#beanMain)" />
      <ellipse cx="20" cy="28" rx="10" ry="12" fill="url(#beanHighlight)" />
      <ellipse cx="40" cy="62" rx="14" ry="16" fill="url(#beanShadow)" />

      <ellipse cx="30" cy="45" rx="5.5" ry="26" fill="url(#grooveCore)" />
      <ellipse cx="29.5" cy="45" rx="6.5" ry="27"
               fill="none"
               stroke="url(#grooveEdge)"
               stroke-width="1.2"
               opacity="0.6"/>
    </g>
  </svg>
</template>

<!-- coffee mug -->
<template id="coffee-mug">
  <div class="flex flex-col items-center">

    <div class="flex gap-1 mb-1">
      <div class="steam"></div>
      <div class="steam delay-1"></div>
      <div class="steam delay-2"></div>
    </div>

    <div class="relative">
      <div class="w-20 h-14 bg-amber-200 border-2 border-amber-400 rounded-b-xl"></div>
      <div class="absolute right-[-10px] top-3 w-6 h-6 border-2 border-amber-400 rounded-full"></div>
    </div>

  </div>
</template>

  <script src="js/loadHeader.js"></script>
  <script src="js/aboutUs.js"></script>

</body>
</html>
