<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Harbor Coffee | Specialty Coffee Roaster</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      color: #333;
    }

    .font-eng {
      font-family: 'Jost', sans-serif;
    }

    .page-enter {
      animation: fadeIn 0.6s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .nav-link.active {
      color: #1d4ed8 !important;
      border-bottom: 2px solid #3b82f6;
    }

    .nav-link.active svg {
      color: #1d4ed8 !important;
    }

    ul,
    ul.list-disc {
      list-style: none !important;
      padding-left: 0 !important;
    }

    .bean-list li {
      position: relative;
      padding-left: 40px;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .bean-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 6px;
      width: 16px;
      height: 26px;
      background-color: #78350f;
      border-radius: 50% / 60%;
    }

    .bean-list li::after {
      content: "";
      position: absolute;
      left: 7px;
      top: 6px;
      width: 2px;
      height: 26px;
      background: white;
      border-radius: 50%;
      transform: rotate(10deg);
    }

    .bean-list li .name-en {
      font-family: 'Jost', sans-serif;
      font-weight: 600;
      font-size: 1.2rem;
      color: #1d4ed8;
      display: block;
    }

    .bean-list li .name-jp {
      font-weight: 500;
      font-size: 1rem;
      color: #333;
      display: block;
    }

    .bean-list li .desc {
      font-size: 0.9rem;
      color: #666;
      display: block;
      margin-top: 2px;
    }

    .bean-decoration {
      display: flex;
      justify-content: center;
    }
    .bean-decoration div {
      gap: 12px;
    }
  </style>
</head>

<body class="bg-white flex flex-col min-h-screen">

  <div id="header"></div>

  <main class="flex-grow">

    <!-- HERO -->
    <section class="relative h-[80vh] md:h-[620px] w-full overflow-hidden page-enter">
      <img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?auto=format&fit=crop&w=2000&q=80"
           class="absolute inset-0 w-full h-full object-cover">
      <div class="absolute inset-0 bg-black/40"></div>

      <div class="relative h-full flex items-center justify-center text-white text-center">
        <h1 class="text-5xl md:text-7xl font-eng font-bold tracking-widest">
          ABOUT&nbsp;US
        </h1>
      </div>
    </section>

    <!-- PHILOSOPHY -->
    <section class="bg-white py-24 px-6">

      <h2 class="text-center mb-20">
        <div class="bean-decoration mb-6"></div>
        <span class="block text-xs tracking-[0.5em] text-gray-400 font-eng mb-2">BLUE HARBOR COFFEE</span>
        <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">PHILOSOPHY</span>
        <div class="bean-decoration mt-6"></div>
      </h2>

      <div class="max-w-3xl mx-auto text-center">
        <p id="philosophy-lead" class="text-xl md:text-2xl text-gray-700 mb-8"></p>
        <p id="philosophy-text1" class="text-gray-600 mb-6"></p>
        <p id="philosophy-text2" class="text-gray-600"></p>
      </div>

    </section>

    <!-- OWNER -->
    <section class="bg-slate-50 py-24 px-6">

      <h2 class="text-center mb-16">
        <div class="bean-decoration mb-6"></div>
        <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">OWNER</span>
        <div class="bean-decoration mt-6"></div>
      </h2>

      <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">

        <img src="https://images.unsplash.com/photo-1556157382-97eda2d62296?q=80&w=1200"
             class="w-full rounded-xl shadow-lg object-cover">

        <div>
          <h3 id="owner-name" class="text-2xl font-medium mb-6"></h3>
          <p id="owner-text1" class="mb-4"></p>
          <p id="owner-text2"></p>
        </div>

      </div>

    </section>

    <!-- BEANS -->
    <section class="bg-white py-24 px-6">

      <h2 class="text-center mb-16">
        <div class="bean-decoration mb-6"></div>
        <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">SIGNATURE BEANS</span>
        <div class="bean-decoration mt-6"></div>
      </h2>

      <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">

        <img src="images/AboutUs/farmer.png"
             class="w-full rounded-xl shadow-lg object-cover">

        <div>
          <h3 id="beans-title" class="text-2xl font-medium mb-6"></h3>
          <p id="beans-text" class="mb-4"></p>
          <ul id="beans-list" class="bean-list"></ul>
        </div>

      </div>

    </section>

    <!-- FRUITS -->
    <section class="bg-amber-50 py-24 px-6">

      <h2 class="text-center mb-16">
        <div class="bean-decoration mb-6"></div>
        <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">FRUITS</span>
        <div class="bean-decoration mt-6"></div>
      </h2>

      <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">

        <img src="images/AboutUs/blueberry_lemon.png"
             class="w-full rounded-xl shadow-lg object-cover">

        <div>
          <p id="fruits-text" class="mb-4"></p>
          <ul id="fruits-list" class="bean-list"></ul>
        </div>

      </div>

    </section>

  </main>

  <footer class="bg-gray-50 border-t py-12 text-center text-xs text-gray-400 font-eng">
    © 2024 Blue Harbor Coffee Roasters.
  </footer>

  <!-- ★ 立体コーヒー豆SVG -->
  <!-- ★ コーヒー豆SVG（単体テンプレ） -->
  <template id="coffee-beans">
  <div class="flex justify-center items-center gap-4">

    <!-- ① 左 -->
    <svg width="32" height="64" viewBox="0 0 20 50">
      <ellipse cx="10" cy="25" rx="8" ry="16" fill="#5a3a1a"/>
      <path d="M6 9 C4 18, 10 32, 8 41" stroke="#f5e6d3" stroke-width="1.2"/>
    </svg>

    <!-- ② やや左 -->
    <svg width="32" height="64" viewBox="0 0 20 50">
      <ellipse cx="10" cy="25" rx="8" ry="16" fill="#5a3a1a"/>
      <path d="M8 9 C6 18, 12 32, 10 41" stroke="#f5e6d3" stroke-width="1.2"/>
    </svg>

    <!-- ③ 正面 -->
    <svg width="32" height="64" viewBox="0 0 20 50">
      <ellipse cx="10" cy="25" rx="8" ry="16" fill="#5a3a1a"/>
      <path d="M10 9 C7 18, 13 32, 10 41" stroke="#f5e6d3" stroke-width="1.2"/>
    </svg>

    <!-- ④ やや右 -->
    <svg width="32" height="64" viewBox="0 0 20 50">
      <ellipse cx="10" cy="25" rx="8" ry="16" fill="#5a3a1a"/>
      <path d="M12 9 C14 18, 8 32, 10 41" stroke="#f5e6d3" stroke-width="1.2"/>
    </svg>

    <!-- ⑤ 右（裏寄り） -->
    <svg width="32" height="64" viewBox="0 0 20 50">
      <ellipse cx="10" cy="25" rx="8" ry="16" fill="#5a3a1a"/>
      <path d="M14 9 C16 18, 10 32, 12 41" stroke="#f5e6d3" stroke-width="1.2"/>
    </svg>

  </div>
  </template>  
  <script src="js/loadHeader.js"></script>
  <script src="js/aboutUs.js"></script>

</body>
</html>
