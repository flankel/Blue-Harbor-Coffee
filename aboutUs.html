<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Harbor Coffee | Specialty Coffee Roaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      body {
        word-break: break-all;
        line-break: strict;
        font-family: 'Zen Kaku Gothic New', sans-serif;
        color: #333;
      }
      .font-eng {
        font-family: 'Jost', sans-serif;
      }
      .page-enter {
        animation: fadeIn 0.6s ease-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      /* ========================= Decoration Row (修正版) ========================= */
      .mug-row {
        display: flex;
        justify-content: center;
        align-items: flex-end; /* ★「中央」ではなく「下」で揃えることで地面を一直線にします */
        gap: 16px;
        width: 100%;
        height: 60px; /* 高さを固定して安定させます */
      }
      .mug-row svg {
        display: block;
        flex-shrink: 0;
      }
      
      /* 既存の他スタイルは維持 */
      .nav-link.active { color: #1d4ed8 !important; border-bottom: 2px solid #3b82f6; }
      ul, ul.list-disc { list-style: none !important; padding-left: 0 !important; }
      .bean-list li { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; line-height: 1.4; }
      .bean-list svg { width: 28px; height: auto; flex-shrink: 0; }
    </style>
  </head>
  <body class="bg-white flex flex-col min-h-screen">
    <div id="header"></div>

    <main class="flex-grow">
      <!-- PHILOSOPHY -->
      <section class="bg-white py-24 px-6 mt-20">
        <h2 class="text-center mb-20">
          <div class="bean-decoration mb-8">
            <div class="mug-row"></div>
          </div>
          <span class="block text-xs tracking-[0.5em] text-gray-400 font-eng mb-2">BLUE HARBOR COFFEE</span>
          <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">PHILOSOPHY</span>
          <div class="bean-decoration mt-8">
            <div class="mug-row"></div>
          </div>
        </h2>
        <div class="max-w-3xl mx-auto text-center">
          <p id="philosophy-lead" class="text-xl md:text-2xl text-gray-700 mb-8"></p>
        </div>
      </section>

      <!-- 他のセクション（構造維持） -->
      <section class="bg-slate-50 py-24 px-6">
        <h2 class="text-center mb-16">
          <div class="bean-decoration mb-8">
            <div class="mug-row"></div>
          </div>
          <span class="text-4xl md:text-5xl font-light tracking-widest text-gray-900">OWNER</span>
          <div class="bean-decoration mt-8">
            <div class="mug-row"></div>
          </div>
        </h2>
      </section>
    </main>

    <!-- ★ 一直線に並ぶための完全水平ケトルテンプレート -->
    <template id="coffee-mug">
      <svg width="50" height="55" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
        <!-- 湯気：位置を固定 -->
        <path d="M72 30 C70 25, 74 25, 72 20" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round">
          <animate attributeName="d" values="M72 30 C70 25, 74 25, 72 20; M72 28 C70 23, 74 23, 72 18; M72 30 C70 25, 74 25, 72 20" dur="2s" repeatCount="indefinite" />
        </path>
        
        <!-- ケトル本体：底辺を y=100 に完全固定 -->
        <path d="M25 100 L28 65 L52 65 L55 100 Z" fill="#FFF" stroke="#1d4ed8" stroke-width="2.5"/>
        
        <!-- 底部の青いライン：y=100 で一直線 -->
        <path d="M25 100 L55 100 L54 105 L26 105 Z" fill="#1d4ed8"/>
        
        <!-- 注ぎ口：y=100 の底辺から計算された配置 -->
        <path d="M52 75 C80 75 82 60 72 40" fill="none" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
        
        <!-- 持ち手 -->
        <path d="M28 72 L15 72 C11 72 11 95 15 95 L25 95" fill="none" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
        
        <!-- 蓋 -->
        <path d="M34 65 L46 65 L45 60 L35 60 Z" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1"/>
        <circle cx="40" cy="58" r="2.5" fill="#1d4ed8"/>
        
        <!-- 接地線（影ではなくラインにすることで水平を強調） -->
        <line x1="20" y1="110" x2="60" y2="110" stroke="#000" stroke-width="1" opacity="0.05" />
      </svg>
    </template>

    <!-- コーヒー豆（変更なし） -->
    <template id="coffee-beans">
      <svg width="44" height="70" viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">
        <g transform="rotate(28 30 45)">
          <ellipse cx="30" cy="45" rx="22" ry="30" fill="#8a5528"></ellipse>
          <ellipse cx="30" cy="45" rx="5.5" ry="26" fill="#2b160a"></ellipse>
        </g>
      </svg>
    </template>

    <script src="js/loadHeader.js"></script>
    <script src="js/aboutUs.js"></script>
  </body>
</html>
