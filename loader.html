<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Coffee Shop Loader</title>
    <style>
        :root {
            --bg-color: #f9f7f2;
            --line-color: #2c5a85;
            --wave-color: #4facfe;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        .loader-container {
            text-align: center;
            position: relative;
        }

        /* マグカップの外枠 */
        .mug-outline {
            width: 200px;
            height: 200px;
            border: 6px solid var(--line-color);
            border-radius: 50%;
            position: relative;
            overflow: hidden; /* 波をカップ内に収める */
            background: white;
        }

        /* 波のアニメーション */
        .wave {
            position: absolute;
            width: 400px; /* カップより広くして横に流す */
            height: 400px;
            background-color: var(--wave-color);
            opacity: 0.6;
            left: -100px;
            bottom: -380px; /* 最初は下の方に隠す (JSで制御) */
            border-radius: 40%; /* 角を丸めて波っぽく見せる */
            animation: drift 4s infinite linear;
            transition: bottom 0.1s ease-out;
        }

        /* 波を2重にして奥行きを出す */
        .wave:nth-child(2) {
            opacity: 0.3;
            animation: drift 7s infinite linear;
            border-radius: 35%;
        }

        @keyframes drift {
            from { transform: rotate(0deg); }
            from { transform: rotate(360deg); }
        }

        /* パーセンテージ表示 */
        .percentage {
            margin-top: 20px;
            font-size: 3rem;
            font-weight: bold;
            color: var(--line-color);
        }
    </style>
</head>
<body>

<div class="loader-container">
    <div class="mug-outline">
        <div class="wave" id="wave1"></div>
        <div class="wave" id="wave2"></div>
    </div>
    <div class="percentage" id="percent-text">0%</div>
</div>

<script>
    const wave1 = document.getElementById('wave1');
    const wave2 = document.getElementById('wave2');
    const text = document.getElementById('percent-text');

    let progress = 0;

    // ローディングのシミュレーション
    const interval = setInterval(() => {
        progress += 1;
        
        // テキスト更新
        text.innerText = progress + "%";

        // 波の高さを上げる計算 (-380px から最大 -180px くらいまで)
        const waveBottom = -380 + (progress * 2); 
        wave1.style.bottom = waveBottom + "px";
        wave2.style.bottom = (waveBottom + 10) + "px";

        if (progress >= 100) {
            clearInterval(interval);
            // 100%になった後の処理（フェードアウトなど）をここに書く
        }
    }, 50); // 速度調整
</script>

</body>
</html>
