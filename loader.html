<div class="loader">

  <div class="loader-inner">

    <h1 style="
      font-size: 22px;
      letter-spacing: 0.3em;
      font-weight: 300;
      color: #333;
      text-align: center;
    ">
      Blue Harbor Coffee
    </h1>

    <p style="
      margin-top: 8px;
      font-size: 12px;
      letter-spacing: 0.2em;
      color: #777;
      text-align: center;
    ">
      Brewing your moment...
    </p>

    <div class="cup" style="
      margin-top: 20px;
      display: flex;
      justify-content: center;
      position: relative;
    ">

      <!-- カップ -->
      <div style="
        width: 32px;
        height: 20px;
        border: 2px solid #999;
        border-radius: 0 0 8px 8px;
      "></div>

      <!-- 持ち手 -->
      <div style="
        position: absolute;
        right: -10px;
        top: 4px;
        width: 10px;
        height: 12px;
        border: 2px solid #999;
        border-radius: 50%;
      "></div>

      <!-- スチーム -->
      <div style="
        position: absolute;
        top: -14px;
        display: flex;
        gap: 4px;
      ">
        <span class="steam"></span>
        <span class="steam delay-1"></span>
        <span class="steam delay-2"></span>
      </div>

    </div>

  </div>

</div>
