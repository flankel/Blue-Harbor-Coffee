<!-- loader.html -->

<style>
/* =========================
   強制的に最前面＆表示保証
========================= */
#loader {
  position: fixed;
  inset: 0;
  z-index: 9999;
  opacity: 1;
  display: flex;
  background: white;
}

/* =========================
   スチームアニメーション
========================= */
.steam {
  width: 3px;
  height: 10px;
  background: #9ca3af;
  border-radius: 2px;
  opacity: 0;
  animation: steamUp 2s infinite;
}

.steam.delay-1 {
  animation-delay: 0.3s;
}

.steam.delay-2 {
  animation-delay: 0.6s;
}

@keyframes steamUp {
  0% {
    transform: translateY(0);
    opacity: 0;
  }
  30% {
    opacity: 1;
  }
  100% {
    transform: translateY(-12px);
    opacity: 0;
  }
}
</style>


<div id="loader" class="flex items-center justify-center transition-opacity duration-700">

  <div class="text-center">

    <h1 class="text-2xl tracking-[0.3em] font-light text-gray-800">
      Blue Harbor Coffee
    </h1>

    <p class="mt-2 text-xs tracking-[0.2em] text-gray-500">
      Brewing your moment...
    </p>

    <div class="mt-6 flex justify-center">
      <div class="relative w-8 h-8">
        
        <!-- カップ -->
        <div class="w-8 h-5 border-2 border-gray-400 rounded-b-md"></div>
        <div class="absolute right-[-6px] top-1 w-2 h-3 border-2 border-gray-400 rounded-full"></div>

        <!-- スチーム -->
        <div class="absolute left-1 top-[-8px] flex gap-1">
          <span class="steam"></span>
          <span class="steam delay-1"></span>
          <span class="steam delay-2"></span>
        </div>

      </div>
    </div>

  </div>
</div>
