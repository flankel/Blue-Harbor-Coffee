<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 text-slate-800">

<div class="max-w-7xl mx-auto p-10">

<h1 class="text-3xl font-semibold mb-8">
Cafe Order Dashboard
</h1>

<!-- ダッシュボード -->
<div class="grid md:grid-cols-4 gap-4 mb-10">

<div class="bg-white p-6 rounded-xl shadow">
<p class="text-sm text-slate-500">注文数</p>
<p id="orderCount" class="text-2xl font-semibold">0</p>
</div>

<div class="bg-white p-6 rounded-xl shadow">
<p class="text-sm text-slate-500">今日の売上</p>
<p id="todaySales" class="text-2xl font-semibold">¥0</p>
</div>

<div class="bg-white p-6 rounded-xl shadow">
<p class="text-sm text-slate-500">準備中</p>
<p id="preparingCount" class="text-2xl font-semibold">0</p>
</div>

<div class="bg-white p-6 rounded-xl shadow">
<p class="text-sm text-slate-500">受渡し待ち</p>
<p id="readyCount" class="text-2xl font-semibold">0</p>
</div>

</div>


<!-- フィルター -->
<div class="flex flex-wrap gap-4 mb-8">

<input
id="searchInput"
placeholder="名前 / 電話で検索"
class="border p-2 rounded-lg">

<input
type="date"
id="filterDate"
class="border p-2 rounded-lg">

<button
onclick="clearFilter()"
class="bg-gray-200 px-4 py-2 rounded-lg">
リセット
</button>

</div>


<!-- 注文一覧 -->
<div id="orders" class="grid md:grid-cols-2 xl:grid-cols-3 gap-6"></div>

</div>

<audio id="orderSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3">
</audio>

<script type="module" src="js/admin.js"></script>

</body>
</html>
